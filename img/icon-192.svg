<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a1530"/>
      <stop offset="100%" stop-color="#0b0a1a"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5d77a"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#a8821e"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" fill="url(#bg)"/>
  <!-- Decorative ring -->
  <circle cx="96" cy="96" r="78" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.45"/>
  <circle cx="96" cy="96" r="70" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.25"/>
  <!-- Mystic glyph: stylised compass / wheel -->
  <g transform="translate(96 96)" stroke="url(#gold)" fill="none" stroke-linecap="round">
    <circle r="42" stroke-width="3"/>
    <path d="M0 -42 L0 -8 M0 42 L0 8 M-42 0 L-8 0 M42 0 L8 0" stroke-width="2.5"/>
    <path d="M-30 -30 L-6 -6 M30 -30 L6 -6 M-30 30 L-6 6 M30 30 L6 6" stroke-width="1.5" opacity="0.7"/>
    <circle r="6" fill="url(#gold)" stroke="none"/>
    <!-- Four petal tips -->
    <path d="M0 -42 q 4 6 0 12 q -4 -6 0 -12 z" fill="url(#gold)" stroke="none"/>
    <path d="M0 42 q 4 -6 0 -12 q -4 6 0 12 z" fill="url(#gold)" stroke="none"/>
    <path d="M-42 0 q 6 4 12 0 q -6 -4 -12 0 z" fill="url(#gold)" stroke="none"/>
    <path d="M42 0 q -6 4 -12 0 q 6 -4 12 0 z" fill="url(#gold)" stroke="none"/>
  </g>
  <!-- Top crescent moon accent -->
  <path d="M96 30 a 14 14 0 1 0 0 28 a 10 10 0 1 1 0 -28 z" fill="url(#gold)" opacity="0.9"/>
</svg>
